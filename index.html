<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo de Luta</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
}

#arena{
  position:relative;
  width:100vw;
  height:100vh;
}

.player{
  position:absolute;
  bottom:0;
}

.player img{
  width:200px;
}

.barra{
  position:absolute;
  top:20px;
  width:40%;
  height:20px;
  background:red;
}

#vidaP1{ left:5%; }
#vidaP2{ right:5%; }

.vida{
  height:100%;
  background:lime;
  width:100%;
}
</style>
</head>

<body>

<div id="arena">

  <div id="vidaP1" class="barra">
    <div id="vida1" class="vida"></div>
  </div>

  <div id="vidaP2" class="barra">
    <div id="vida2" class="vida"></div>
  </div>

  <div id="p1" class="player">
    <img id="p1img" src="./Gemini_Generated_Image_4w6ctc4w6ctc4w6c.png">
  </div>

  <div id="p2" class="player">
    <img id="p2img" src="./Gemini_Generated_Image_l88erjl88erjl88e.png">
  </div>

</div>

<script>

let p1X = 100;
let p2X = window.innerWidth - 300;

let p1Vida = 100;
let p2Vida = 100;

let p1Defesa = false;
let p2Defesa = false;

let p1Cooldown = 0;
let p2Cooldown = 0;

let p1Atacando = false;
let p2Atacando = false;

let keysPressed = new Set();

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");
const p1Img = document.getElementById("p1img");
const p2Img = document.getElementById("p2img");

const vida1 = document.getElementById("vida1");
const vida2 = document.getElementById("vida2");

const spritesP1 = {
  IDLE:"./Gemini_Generated_Image_4w6ctc4w6ctc4w6c.png",
  SOCO:"./Gemini_Generated_Image_2703an2703an2703.png",
  DEFESA:"./Gemini_Generated_Image_l3yczwl3yczwl3yc.png",
  CORRER:"./Gemini_Generated_Image_2c86rh2c86rh2c86.png",
  ESPECIAL:"./Gemini_Generated_Image_3d02v03d02v03d02.png"
};

const spritesP2 = {
  IDLE:"./Gemini_Generated_Image_l88erjl88erjl88e.png",
  SOCO:"./Gemini_Generated_Image_inom8ninom8ninom.png",
  CHUTE:"./Gemini_Generated_Image_riho7oriho7oriho.png",
  DEFESA:"./Gemini_Generated_Image_l88erjl88erjl88e.png",
  CORRER:"./Gemini_Generated_Image_577txo577txo577t.png",
  ESPECIAL1:"./Gemini_Generated_Image_l88erjl88erjl88e.png",
  ESPECIAL2:"./Gemini_Generated_Image_riho7oriho7oriho.png",
  ESPECIAL3:"./Gemini_Generated_Image_bnydkebnydkebnyd.png"
};

function trocarImagem(player, estado){
  if(player===1 && spritesP1[estado]) p1Img.src = spritesP1[estado];
  if(player===2 && spritesP2[estado]) p2Img.src = spritesP2[estado];
}

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

document.addEventListener("keydown",e=>{
  keysPressed.add(e.key.toLowerCase());
});

document.addEventListener("keyup",e=>{
  keysPressed.delete(e.key.toLowerCase());
});

document.addEventListener("keydown",e=>{

  if(e.repeat) return;

  if(e.key==="w" && p1Cooldown<=0) atacar(1,"SOCO");
  if(e.key==="q" && p1Cooldown<=0) especial(1);

  if(e.key==="ArrowUp" && p2Cooldown<=0) atacar(2,"SOCO");
  if(e.key==="o" && p2Cooldown<=0) atacar(2,"CHUTE");
  if(e.key==="p" && p2Cooldown<=0) especial(2);
});

function atacar(player,tipo){

  if(player===1){
    p1Atacando=true;
    trocarImagem(1,tipo);
    p1Cooldown=40;

    if(Math.abs(p1X-p2X)<150){
      let dano= tipo==="SOCO"?10:15;
      if(p2Defesa) dano*=0.5;
      p2Vida-=dano;
    }

    setTimeout(()=>{
      p1Atacando=false;
      trocarImagem(1,"IDLE");
    },300);
  }

  if(player===2){
    p2Atacando=true;
    trocarImagem(2,tipo);
    p2Cooldown=40;

    if(Math.abs(p1X-p2X)<150){
      let dano= tipo==="SOCO"?10:15;
      if(p1Defesa) dano*=0.5;
      p1Vida-=dano;
    }

    setTimeout(()=>{
      p2Atacando=false;
      trocarImagem(2,"IDLE");
    },300);
  }
}

function especial(player){

  if(player===1){
    p1Atacando=true;
    trocarImagem(1,"ESPECIAL");
    p1Cooldown=100;

    if(Math.abs(p1X-p2X)<180){
      let dano=30;
      if(p2Defesa) dano*=0.5;
      p2Vida-=dano;
    }

    setTimeout(()=>{
      p1Atacando=false;
      trocarImagem(1,"IDLE");
    },500);
  }

  if(player===2){
    p2Atacando=true;
    p2Cooldown=120;

    let seq=["ESPECIAL1","ESPECIAL2","ESPECIAL3"];
    let i=0;

    let intervalo=setInterval(()=>{
      trocarImagem(2,seq[i]);
      i++;
      if(i>=seq.length){
        clearInterval(intervalo);
        p2Atacando=false;
        trocarImagem(2,"IDLE");
      }
    },200);

    if(Math.abs(p1X-p2X)<180){
      let dano=35;
      if(p1Defesa) dano*=0.5;
      p1Vida-=dano;
    }
  }
}

function processarMovimento(){

  if(keysPressed.has("a") && p1X>0){
    p1X-=6;
    if(!p1Atacando) trocarImagem(1,"CORRER");
  }

  if(keysPressed.has("d") && p1X<window.innerWidth-250){
    p1X+=6;
    if(!p1Atacando) trocarImagem(1,"CORRER");
  }

  if(keysPressed.has("s")){
    p1Defesa=true;
    if(!p1Atacando) trocarImagem(1,"DEFESA");
  }else{
    p1Defesa=false;
  }

  if(keysPressed.has("arrowleft") && p2X>0){
    p2X-=6;
    if(!p2Atacando) trocarImagem(2,"CORRER");
  }

  if(keysPressed.has("arrowright") && p2X<window.innerWidth-250){
    p2X+=6;
    if(!p2Atacando) trocarImagem(2,"CORRER");
  }

  if(keysPressed.has("arrowdown")){
    p2Defesa=true;
    if(!p2Atacando) trocarImagem(2,"DEFESA");
  }else{
    p2Defesa=false;
  }

  if(!p1Atacando && !keysPressed.has("a") && !keysPressed.has("d") && !keysPressed.has("s")){
    trocarImagem(1,"IDLE");
  }

  if(!p2Atacando && !keysPressed.has("arrowleft") && !keysPressed.has("arrowright") && !keysPressed.has("arrowdown")){
    trocarImagem(2,"IDLE");
  }
}

function atualizar(){

  processarMovimento();

  if(p1Cooldown>0) p1Cooldown--;
  if(p2Cooldown>0) p2Cooldown--;

  p1Vida=clamp(p1Vida,0,100);
  p2Vida=clamp(p2Vida,0,100);

  vida1.style.width=p1Vida+"%";
  vida2.style.width=p2Vida+"%";

  p1.style.left=p1X+"px";
  p2.style.left=p2X+"px";

  requestAnimationFrame(atualizar);
}

atualizar();

</script>
</body>
</html>
